<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="paw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#4C1D95" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Subtle pattern dots -->
  <circle cx="120" cy="120" r="20" fill="white" opacity="0.08"/>
  <circle cx="400" cy="100" r="28" fill="white" opacity="0.06"/>
  <circle cx="100" cy="380" r="16" fill="white" opacity="0.07"/>
  <circle cx="380" cy="400" r="22" fill="white" opacity="0.05"/>

  <!-- Glow behind star -->
  <circle cx="256" cy="210" r="120" fill="url(#star)" opacity="0.15" filter="url(#glow)"/>

  <!-- Main star -->
  <g filter="url(#softShadow)">
    <path d="M256 50 L295 168 L420 185 L319 275 L343 400 L256 342 L169 400 L193 275 L92 185 L217 168 Z"
          fill="url(#star)"/>
  </g>

  <!-- Star highlight -->
  <path d="M256 70 L286 162 L388 177 L304 252 L323 353 L256 306 L189 353 L208 252 L124 177 L226 162 Z"
        fill="url(#shine)" opacity="0.6"/>

  <!-- Paw print in center of star -->
  <g transform="translate(256,220)" opacity="0.9">
    <!-- Main pad -->
    <path d="M-30 0 C-30 -25 -10 -40 0 -40 C10 -40 30 -25 30 0 C30 20 15 35 0 35 C-15 35 -30 20 -30 0Z"
          fill="url(#paw)"/>
    <!-- Toe 1 -->
    <ellipse cx="-32" cy="-42" rx="16" ry="20" fill="#F8FAFC" transform="rotate(-15,-32,-42)"/>
    <!-- Toe 2 -->
    <ellipse cx="-14" cy="-55" rx="16" ry="20" fill="#F8FAFC" transform="rotate(-5,-14,-55)"/>
    <!-- Toe 3 -->
    <ellipse cx="14" cy="-55" rx="16" ry="20" fill="#F8FAFC" transform="rotate(5,14,-55)"/>
    <!-- Toe 4 -->
    <ellipse cx="32" cy="-42" rx="16" ry="20" fill="#F8FAFC" transform="rotate(15,32,-42)"/>
  </g>

  <!-- Top shine -->
  <ellipse cx="180" cy="80" rx="160" ry="80" fill="white" opacity="0.12"
           transform="rotate(-30 180 80)"/>
</svg>
