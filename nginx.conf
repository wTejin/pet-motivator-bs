server {
    listen 80;
    server_name xingchong.online www.xingchong.online 119.29.252.83;
    # HTTP → HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xingchong.online www.xingchong.online;
    root /usr/share/nginx/html;
    index index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/xingchong.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xingchong.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # SPA client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static files served by Express (avatars, pet images, etc.)
    location /avatars/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    location /images/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    # Logos — static files served directly by nginx from client/dist/logos/
    location /logos/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
